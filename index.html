<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0E2A6B" />
<title>House Cleaning Service — Free Quote</title>
<meta name="description" content="Spotless homes. Reliable service. Message us for a free quote — serving your neighborhood." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#0E2A6B;
    --navy-2:#13379A;
    --blue:#1A9FCC;
    --blue-2:#36BCE0;
    --green:#7BC142;
    --green-2:#92D454;
    --bg:#F4FAFD;
    --white:#ffffff;
    --shadow: 0 20px 40px -15px rgba(14,42,107,.35);
    --shadow-sm: 0 8px 20px -10px rgba(14,42,107,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--navy);font-family:'Poppins',system-ui,sans-serif;overflow-x:hidden}
  body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);position:relative}

  /* ---------- Animated background: bubbles + soft gradient ---------- */
  .bg{
    position:fixed;inset:0;z-index:0;overflow:hidden;
    background:
      radial-gradient(1200px 700px at 50% -10%, #cfeaf6 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 110%, #d9efc6 0%, transparent 55%),
      linear-gradient(180deg,#f4fafd 0%, #eaf5fa 100%);
  }
  .bubble{
    position:absolute;bottom:-80px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), rgba(54,188,224,.35) 60%, rgba(54,188,224,.05) 75%);
    box-shadow:inset -4px -6px 10px rgba(14,42,107,.08), 0 4px 14px rgba(26,159,204,.18);
    opacity:.8;animation:rise linear infinite;
  }
  .bubble::after{content:"";position:absolute;top:14%;left:18%;width:28%;height:20%;border-radius:50%;background:rgba(255,255,255,.7);filter:blur(1px)}
  @keyframes rise{
    0%{transform:translateY(0) translateX(0) scale(.9);opacity:0}
    8%{opacity:.85}
    50%{transform:translateY(-55vh) translateX(20px) scale(1)}
    100%{transform:translateY(-115vh) translateX(-15px) scale(1.05);opacity:0}
  }

  /* ---------- Squeegee reveal on load ---------- */
  .squeegee{
    position:fixed;inset:0;z-index:50;pointer-events:none;
    background:linear-gradient(90deg, rgba(255,255,255,.05) 0%, rgba(26,159,204,.95) 35%, rgba(123,193,66,.95) 55%, rgba(255,255,255,.05) 100%);
    transform:translateX(-110%);
    animation:wipe 1.5s cubic-bezier(.7,.05,.25,1) .15s forwards;
  }
  .squeegee::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse 60% 80% at 50% 50%, rgba(255,255,255,.35), transparent 70%),
               repeating-linear-gradient(90deg, transparent 0 8px, rgba(255,255,255,.08) 8px 9px);
    mix-blend-mode:overlay;
  }
  @keyframes wipe{
    0%{transform:translateX(-110%)}
    60%{transform:translateX(10%)}
    100%{transform:translateX(115%)}
  }

  /* ---------- Reveal content after squeegee ---------- */
  .stage{position:relative;z-index:2;width:100%;max-width:440px;margin:0 auto;opacity:0;transform:translateY(8px);animation:enter .7s ease .9s forwards}
  @keyframes enter{to{opacity:1;transform:none}}

  /* ---------- Header / Logo ---------- */
  .header{padding:28px 0 8px;text-align:center;position:relative}
  .tagline{
    font-size:11px;letter-spacing:.22em;font-weight:700;color:var(--blue);
    text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .tagline .dot{width:5px;height:5px;border-radius:50%;background:var(--blue);display:inline-block}
  .brand{
    font-weight:900;line-height:.92;margin:10px 0 2px;
    font-size:clamp(40px,12vw,56px);color:var(--navy);
    letter-spacing:-.02em;
  }
  .brand .o{display:inline-flex;align-items:center;justify-content:center;width:.95em;height:.95em;background:var(--navy);border-radius:50%;vertical-align:-.06em;position:relative;margin:0 -.05em}
  .brand .o svg{width:55%;height:55%;animation:spin 8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand2{
    font-weight:900;font-size:clamp(30px,9vw,42px);color:var(--blue);letter-spacing:-.02em;line-height:1
  }
  .sub{
    margin-top:8px;font-weight:800;letter-spacing:.08em;font-size:14px;color:var(--navy);
    position:relative;display:inline-block;padding:0 24px;
  }
  .sub::before,.sub::after{content:"";position:absolute;top:50%;width:18px;height:2px;background:var(--green);border-radius:2px}
  .sub::before{left:0}
  .sub::after{right:0}

  /* ---------- Floating sparkles ---------- */
  .spark{position:absolute;width:18px;height:18px;color:var(--blue);opacity:.9;animation:twinkle 2.4s ease-in-out infinite}
  .spark.s1{top:8px;left:8%}
  .spark.s2{top:46px;right:10%;width:14px;height:14px;animation-delay:.6s;color:var(--green)}
  .spark.s3{top:120px;left:4%;width:12px;height:12px;animation-delay:1.1s}
  .spark.s4{top:100px;right:6%;width:10px;height:10px;animation-delay:.3s;color:var(--green)}
  @keyframes twinkle{0%,100%{transform:scale(.7) rotate(0);opacity:.45}50%{transform:scale(1.1) rotate(20deg);opacity:1}}

  /* ---------- Hero card (house illustration) ---------- */
  .hero{margin:18px auto 6px;display:flex;justify-content:center;position:relative}
  .hero svg{width:170px;height:auto;filter:drop-shadow(0 16px 22px rgba(14,42,107,.25));animation:bob 4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .swoosh{position:absolute;inset:auto 0 -10px 0;height:60px;pointer-events:none}

  /* ---------- CTA buttons ---------- */
  .cta-wrap{display:flex;flex-direction:column;gap:14px;margin:22px 0 6px}
  .btn{
    position:relative;display:flex;align-items:center;justify-content:center;gap:12px;
    padding:18px 22px;border-radius:18px;font-weight:800;font-size:17px;letter-spacing:.01em;
    text-decoration:none;box-shadow:var(--shadow);overflow:hidden;transition:transform .15s ease, box-shadow .2s ease;
    border:0;cursor:pointer;
  }
  .btn:active{transform:translateY(2px) scale(.99)}
  .btn .ico{width:22px;height:22px;flex-shrink:0}
  .btn-primary{background:linear-gradient(135deg,var(--green) 0%, var(--green-2) 100%);color:#0c2c0c}
  .btn-primary .small{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.75;display:block}
  .btn-primary .big{font-size:18px;font-weight:900;display:block;line-height:1.05}
  .btn-secondary{background:linear-gradient(135deg,var(--navy) 0%, var(--navy-2) 100%);color:#fff}
  .btn-tertiary{background:linear-gradient(135deg,var(--blue) 0%, var(--blue-2) 100%);color:#fff}

  /* shimmer sweep on primary */
  .btn-primary::before{
    content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.7) 50%, transparent 100%);
    transform:skewX(-20deg);
    animation:shine 2.8s ease-in-out infinite;
  }
  @keyframes shine{0%{left:-60%}60%{left:130%}100%{left:130%}}

  /* pulse ring on call */
  .pulse{position:absolute;inset:-4px;border-radius:22px;border:2px solid rgba(26,159,204,.6);animation:pulse 1.8s ease-out infinite;pointer-events:none}
  @keyframes pulse{0%{transform:scale(.96);opacity:.8}100%{transform:scale(1.05);opacity:0}}

  /* ---------- Services chips ---------- */
  .chips{display:flex;gap:10px;justify-content:center;margin:16px 0 4px;flex-wrap:wrap}
  .chip{
    display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;
    background:#fff;color:var(--navy);font-weight:700;font-size:13px;
    box-shadow:var(--shadow-sm);border:1px solid #e5eff4;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .chip.b .dot{background:var(--blue)}
  .chip.g .dot{background:var(--green)}

  /* ---------- Trust strip ---------- */
  .trust{
    margin:18px 0 8px;display:flex;justify-content:center;align-items:center;gap:14px;
    font-size:12px;color:#41608f;font-weight:600;letter-spacing:.04em
  }
  .trust span{display:inline-flex;align-items:center;gap:6px}
  .trust svg{width:14px;height:14px;color:var(--green)}

  /* ---------- Footer ---------- */
  .foot{margin:18px 0 28px;text-align:center;font-size:11px;color:#7a8aa3;letter-spacing:.06em}

  /* ---------- Tap ripple ---------- */
  .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.55);transform:scale(0);animation:ripple .6s linear;pointer-events:none}
  @keyframes ripple{to{transform:scale(8);opacity:0}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
    .stage{opacity:1;transform:none}
    .squeegee{display:none}
  }
</style>
</head>
<body>

<div class="bg" aria-hidden="true">
  <!-- bubbles generated by JS -->
</div>
<div class="squeegee" aria-hidden="true"></div>

<main class="stage">

  <header class="header">
    <!-- Sparkles -->
    <svg class="spark s1" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0l2.4 8.4L24 12l-9.6 3.6L12 24l-2.4-8.4L0 12l9.6-3.6z"/></svg>
    <svg class="spark s2" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0l2.4 8.4L24 12l-9.6 3.6L12 24l-2.4-8.4L0 12l9.6-3.6z"/></svg>
    <svg class="spark s3" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0l2.4 8.4L24 12l-9.6 3.6L12 24l-2.4-8.4L0 12l9.6-3.6z"/></svg>
    <svg class="spark s4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0l2.4 8.4L24 12l-9.6 3.6L12 24l-2.4-8.4L0 12l9.6-3.6z"/></svg>

    <div class="tagline">
      <span>Spotless Homes</span>
      <span class="dot"></span>
      <span>Reliable Service</span>
    </div>

    <h1 class="brand">
      H<span class="o"><svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true"><path d="M12 0l2.4 8.4L24 12l-9.6 3.6L12 24l-2.4-8.4L0 12l9.6-3.6z"/></svg></span>USE
    </h1>
    <div class="brand2">CLEANING</div>
    <div class="sub">SERVICE</div>
  </header>

  <!-- Animated illustration: house + swoosh + sparkles -->
  <div class="hero" aria-hidden="true">
    <svg viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
      <!-- green swoosh -->
      <path d="M20,170 C40,90 130,40 200,70" fill="none" stroke="#7BC142" stroke-width="6" stroke-linecap="round" opacity=".85">
        <animate attributeName="stroke-dasharray" values="0,400;220,200;0,400" dur="6s" repeatCount="indefinite"/>
      </path>
      <!-- blue swoosh -->
      <path d="M10,180 C60,150 130,150 210,120" fill="none" stroke="#1A9FCC" stroke-width="4" stroke-linecap="round" opacity=".7">
        <animate attributeName="stroke-dasharray" values="200,200;0,400;200,200" dur="6s" repeatCount="indefinite"/>
      </path>

      <!-- house body -->
      <g transform="translate(50,55)">
        <!-- roof -->
        <path d="M0,55 L55,5 L110,55 Z" fill="#0E2A6B"/>
        <!-- chimney -->
        <rect x="80" y="15" width="14" height="20" fill="#0E2A6B"/>
        <!-- walls -->
        <rect x="10" y="55" width="90" height="70" fill="#1A9FCC"/>
        <!-- window -->
        <rect x="22" y="68" width="28" height="34" rx="3" fill="#cfeaf6" stroke="#0E2A6B" stroke-width="3"/>
        <line x1="36" y1="68" x2="36" y2="102" stroke="#0E2A6B" stroke-width="2"/>
        <line x1="22" y1="85" x2="50" y2="85" stroke="#0E2A6B" stroke-width="2"/>
        <!-- door area covered by spray/broom -->
      </g>

      <!-- bucket -->
      <g transform="translate(35,135)">
        <path d="M0,5 L70,5 L62,40 L8,40 Z" fill="#1A9FCC"/>
        <ellipse cx="35" cy="5" rx="35" ry="5" fill="#36BCE0"/>
        <path d="M14,12 Q35,18 56,12" fill="#92D454" opacity=".85"/>
      </g>

      <!-- spray bottle -->
      <g transform="translate(85,90)">
        <rect x="6" y="20" width="22" height="34" rx="3" fill="#fff" stroke="#0E2A6B" stroke-width="2"/>
        <rect x="10" y="30" width="14" height="10" fill="#cfeaf6"/>
        <path d="M6,18 L18,18 L18,10 L28,10 L28,20" fill="#0E2A6B"/>
        <!-- spray puffs -->
        <circle cx="36" cy="6" r="2.2" fill="#fff" opacity=".9">
          <animate attributeName="cx" values="32;46" dur="1.6s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="10;0" dur="1.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="4" r="1.8" fill="#fff" opacity=".9">
          <animate attributeName="cx" values="34;50" dur="1.6s" begin=".4s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="12;-4" dur="1.6s" begin=".4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0" dur="1.6s" begin=".4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="44" cy="8" r="1.4" fill="#fff" opacity=".9">
          <animate attributeName="cx" values="36;52" dur="1.6s" begin=".8s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="14;-2" dur="1.6s" begin=".8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0" dur="1.6s" begin=".8s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- broom -->
      <g transform="translate(140,80) rotate(15)">
        <rect x="0" y="0" width="4" height="60" fill="#0E2A6B"/>
        <path d="M-8,58 L12,58 L18,82 L-14,82 Z" fill="#7BC142"/>
        <line x1="-8" y1="62" x2="-12" y2="80" stroke="#0E2A6B" stroke-width="1.5"/>
        <line x1="-2" y1="62" x2="-4" y2="80" stroke="#0E2A6B" stroke-width="1.5"/>
        <line x1="4" y1="62" x2="6" y2="80" stroke="#0E2A6B" stroke-width="1.5"/>
        <line x1="10" y1="62" x2="14" y2="80" stroke="#0E2A6B" stroke-width="1.5"/>
      </g>

      <!-- tiny sparkles on house -->
      <g fill="#1A9FCC">
        <path d="M30,60 l2,7 l7,2 l-7,2 l-2,7 l-2,-7 l-7,-2 l7,-2z" opacity=".7">
          <animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/>
        </path>
        <path d="M180,90 l1.5,5 l5,1.5 l-5,1.5 l-1.5,5 l-1.5,-5 l-5,-1.5 l5,-1.5z" opacity=".7">
          <animate attributeName="opacity" values=".2;1;.2" dur="2.4s" begin=".5s" repeatCount="indefinite"/>
        </path>
      </g>
    </svg>
  </div>

  <!-- CTAs -->
  <div class="cta-wrap">

    <a class="btn btn-primary" href="sms:+14707071177?&body=Hi!%20I'd%20like%20a%20FREE%20quote%20for%20house%20cleaning.">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>
        <span class="small">Message us for a</span>
        <span class="big">FREE Quote</span>
      </span>
    </a>

    <a class="btn btn-secondary" href="tel:+14707071177" style="position:relative">
      <span class="pulse" aria-hidden="true"></span>
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
      <span>Call (470)&nbsp;707-1177</span>
    </a>

  </div>

  <div class="chips" aria-label="Services">
    <span class="chip b"><span class="dot"></span> Deep Cleaning</span>
    <span class="chip g"><span class="dot"></span> Regular Cleaning</span>
  </div>

  <div class="trust">
    <span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Insured
    </span>
    <span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Reliable
    </span>
    <span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Eco-Friendly
    </span>
  </div>

  <div class="foot">© House Cleaning Service · Tap to message or call</div>

</main>

<script>
  // ---- Generate floating bubbles ----
  (function(){
    const bg = document.querySelector('.bg');
    const count = 14;
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 14 + Math.random() * 46;
      b.style.width = b.style.height = size + 'px';
      b.style.left = (Math.random() * 100) + '%';
      b.style.animationDuration = (8 + Math.random() * 10) + 's';
      b.style.animationDelay = (Math.random() * 8) + 's';
      b.style.opacity = (0.35 + Math.random() * 0.5).toFixed(2);
      bg.appendChild(b);
    }
  })();

  // ---- Ripple on buttons ----
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const r = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(r.width, r.height) / 4;
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - r.left - size/2) + 'px';
      ripple.style.top  = (e.clientY - r.top  - size/2) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
    });
  });
</script>

</body>
</html>
